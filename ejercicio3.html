<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformaciones 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2c2c3c);
}

/* PANEL SUPERIOR */
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    box-shadow: 0 0 10px #00ffcc;
}

/* TÍTULO */
#info h1 {
    margin: 0;
    font-size: 22px;
    color: #00ffcc;
}

/* AUTOR */
#info h2 {
    margin: 5px 0;
    font-size: 16px;
    color: #ff4444;
}

/* CONTROLES */
#info p {
    margin: 5px 0;
    color: #ffffff;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="info">
    <h1>TRASLACIÓN, ROTACIÓN Y ESCALADO</h1>
    <h2>HECHO POR: VIGIL SILVA CAYTUIRO</h2>
    <p>FLECHAS: Mover el cubo</p>
    <p>Q / E: Rotar el cubo</p>
    <p>Z / X: Escalar el cubo</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(3,3,5);
camera.lookAt(0,0,0);

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🎨 MATERIALES (CADA CARA UN COLOR)
const materials = [
    new THREE.MeshBasicMaterial({ color: 0xff0000 }), // rojo
    new THREE.MeshBasicMaterial({ color: 0x00ff00 }), // verde
    new THREE.MeshBasicMaterial({ color: 0x0000ff }), // azul
    new THREE.MeshBasicMaterial({ color: 0xffff00 }), // amarillo
    new THREE.MeshBasicMaterial({ color: 0xff00ff }), // rosado
    new THREE.MeshBasicMaterial({ color: 0x00ffff })  // celeste
];

// CUBO
const geometry = new THREE.BoxGeometry(1,1,1);
const cubo = new THREE.Mesh(geometry, materials);
scene.add(cubo);

// CONTROLES
window.addEventListener('keydown', (event) => {
    event.preventDefault();

    switch(event.key) {

        // MOVER
        case 'ArrowUp': cubo.position.y += 0.2; break;
        case 'ArrowDown': cubo.position.y -= 0.2; break;
        case 'ArrowLeft': cubo.position.x -= 0.2; break;
        case 'ArrowRight': cubo.position.x += 0.2; break;

        // ROTAR
        case 'q':
        case 'Q':
            cubo.rotation.y -= 0.2;
            cubo.rotation.x -= 0.1;
            break;

        case 'e':
        case 'E':
            cubo.rotation.y += 0.2;
            cubo.rotation.x += 0.1;
            break;

        // ESCALAR SIN DISTORSIÓN
        case 'z':
        case 'Z':
            if (cubo.scale.x < 3) {
                cubo.scale.set(
                    cubo.scale.x + 0.1,
                    cubo.scale.y + 0.1,
                    cubo.scale.z + 0.1
                );
            }
            break;

        case 'x':
        case 'X':
            if (cubo.scale.x > 0.2) {
                cubo.scale.set(
                    cubo.scale.x - 0.1,
                    cubo.scale.y - 0.1,
                    cubo.scale.z - 0.1
                );
            }
            break;
    }
});

// ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// RESPONSIVE
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
