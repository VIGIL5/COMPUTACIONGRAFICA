<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creación de un círculo</title>
</head>
<body>
    <h2>Dibujo de un círculo</h2>
    <h2>vigil silva caytuiro</h2>
    <!-- DEFINIR UN AREA DE DIBUJO CON EL ELEMENTO CANVAS -->
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></CAnvas>
<!-- CODIGO  JAVASCRIPT -->
    <script>
        // OBTENER EL CONTEXTO DE DIBUJO DEL CANVAS
        var canvas = document.getElementById("myCanvas");
        //se obtiene el contexto de dibujo en 2D
        var  ctx = canvas.getContext("2d");
         // comenzar el trazado de una (circulo en este punto se inicia el dibujo)
        ctx.beginPath();

        // dibujar el arco para representar el circulo 
                // las coordendas (x, y) ubique el centro.
         // el radio del circulo es de 100 pixeles 

         ctx.arc(250, 250, 100,0, 2 * Math.PI);   

        // definir el color del relleno del circulo
        ctx.fillStyle = "lightblue";
        // rellenar el circulo con el color definido
        ctx.fill();
        
        // dibujar el borde del circulo con un color diferente
        ctx.stroke();
    </script>


</body>
</html>
