<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio 3D</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

nav h2 {
    margin: 0;
    color: #00ffcc;
    letter-spacing: 2px;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

nav ul li {
    cursor: pointer;
    transition: 0.3s;
}

nav ul li:hover {
    color: #00ffcc;
}

/* TITULO */
h1 {
    margin: 50px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s forwards;
}

/* CONTENEDOR */
.container {
    display: flex;
    gap: 30px;
    padding: 20px 50px;
    flex-wrap: wrap;
}

/* TARJETAS */
.card {
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    padding: 15px;
    width: 260px;
    cursor: pointer;
    transition: 0.4s;
    opacity: 0;
    transform: translateY(50px);
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 20px #00ffcc;
}

/* IMAGEN */
.card img {
    width: 100%;
    border-radius: 10px;
}

/* TEXTO */
.card h3 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 14px;
    color: #ccc;
}

/* ANIMACIONES */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2>&lt; DEV.PORT /&gt;</h2>
    <ul>
        <li>INICIO</li>
        <li>PROYECTOS</li>
    </ul>
</nav>

<!-- TITULO -->
<h1>Ejercicios 3D</h1>

<!-- TARJETAS -->
<div class="container">

    <div class="card" onclick="location.href='ejercicio1.html'">
        <img src="img1.png">
        <h3>Ejercicio 1</h3>
        <p>Desplazamiento del cubo</p>
    </div>

    <div class="card" onclick="location.href='ejercicio2.html'">
        <img src="img2.png">
        <h3>Ejercicio 2</h3>
        <p>Rotación del cubo</p>
    </div>

    <div class="card" onclick="location.href='ejercicio3.html'">
        <img src="img3.png">
        <h3>Ejercicio 3</h3>
        <p>Transformaciones completas</p>
    </div>

</div>

<script>
// ANIMACIÓN AL HACER SCROLL
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
            card.style.opacity = 1;
            card.style.transform = 'translateY(0)';
            card.style.transition = '0.6s ease';
        }
    });
});

// ANIMACIÓN INICIAL
window.addEventListener('load', () => {
    setTimeout(() => {
        cards.forEach((card, i) => {
            setTimeout(() => {
                card.style.opacity = 1;
                card.style.transform = 'translateY(0)';
                card.style.transition = '0.6s ease';
            }, i * 200);
        });
    }, 300);
});
</script>

</body>
</html>
