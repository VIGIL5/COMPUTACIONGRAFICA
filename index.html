<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio 3D</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.6);
}

nav h2 {
    margin: 0;
    color: #00ffcc;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li {
    cursor: pointer;
}

/* TITULO */
h1 {
    margin: 40px;
}

/* TARJETAS */
.container {
    display: flex;
    gap: 30px;
    padding: 20px 40px;
}

.card {
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    padding: 15px;
    width: 250px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffcc;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 14px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2>&lt; DEV.PORT /&gt;</h2>
    <ul>
        <li>INICIO</li>
        <li>PROYECTOS</li>
    </ul>
</nav>

<!-- TITULO -->
<h1>Ejercicios 3D</h1>

<!-- TARJETAS -->
<div class="container">

    <div class="card" onclick="location.href='ejercicio1.html'">
        <img src="img1.png">
        <h3>Ejercicio 1</h3>
        <p>Movimiento del cubo</p>
    </div>

    <div class="card" onclick="location.href='ejercicio2.html'">
        <img src="img2.png">
        <h3>Ejercicio 2</h3>
        <p>Rotación del cubo</p>
    </div>

    <div class="card" onclick="location.href='ejercicio3.html'">
        <img src="img3.png">
        <h3>Ejercicio 3</h3>
        <p>Transformaciones completas</p>
    </div>

</div>

</body>
</html>
