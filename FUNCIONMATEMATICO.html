<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gráfico dinámico</title>
</head>

<body>

<h2>Gráfico de líneas dinámico</h2>

<canvas id="myCanvas" width="500" height="500" style="border:4px solid black; background:white;"></canvas>

<script>
const canvas = document.getElementById('myCanvas');
const ctx = canvas.getContext('2d');

let t = 0; // tiempo

function dibujar() {

    // limpiar pantalla
    ctx.clearRect(0, 0, 500, 500);

    // Ejes
    ctx.beginPath();
    ctx.moveTo(0, 250);
    ctx.lineTo(500, 250);
    ctx.moveTo(250, 0);
    ctx.lineTo(250, 500);
    ctx.strokeStyle = 'black';
    ctx.stroke();

    // Gráfico de línea (onda)
    ctx.beginPath();

    for (let x = -250; x < 250; x++) {

        let y = 100 * Math.sin((x * 0.05) - t);

        ctx.lineTo(250 + x, 250 - y);
    }

    ctx.strokeStyle = 'blue';
    ctx.lineWidth = 2;
    ctx.stroke();
}

// animación
function animar() {
    t += 0.1; // cambia con el tiempo
    dibujar();
}

// se actualiza constantemente
setInterval(animar, 50);
</script>

</body>
</html>
